<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Training Portal | Advanced</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{background:#0f172a;color:#e2e8f0}
.glass{background:rgba(30,41,59,.7);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08)}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.big-btn{padding:14px;font-size:17px}
.progress{height:6px;border-radius:10px}
.table-row:hover{background:rgba(255,255,255,.05)}
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="glass p-4 text-center text-xl font-bold">
HR Training Portal
</header>

<div class="flex justify-center gap-2 p-3 text-sm">
<button onclick="switchTab('register')" class="bg-cyan-600 px-4 py-2 rounded">ลงทะเบียน</button>
<button onclick="switchTab('checkin')" class="bg-slate-700 px-4 py-2 rounded">เช็คชื่อ</button>
<button onclick="switchTab('admin')" class="bg-slate-700 px-4 py-2 rounded">Admin</button>
</div>

<main class="flex-1 p-4">

<!-- REGISTER -->
<section id="page-register">
<div class="glass p-6 rounded-xl max-w-md mx-auto fade">
<h2 class="text-lg font-bold mb-4">ลงทะเบียนพนักงานใหม่</h2>
<form id="regForm" class="space-y-3">
<input name="prefix" placeholder="คำนำหน้า" class="w-full p-3 rounded bg-slate-800">
<input required name="name" placeholder="ชื่อ-นามสกุล" class="w-full p-3 rounded bg-slate-800">
<input required name="nickname" placeholder="ชื่อเล่น" class="w-full p-3 rounded bg-slate-800">
<input required name="team" placeholder="ทีม" class="w-full p-3 rounded bg-slate-800">
<input required name="phone" placeholder="เบอร์โทร" class="w-full p-3 rounded bg-slate-800">
<input name="dept" placeholder="แผนก" class="w-full p-3 rounded bg-slate-800">
<input name="recruiter" placeholder="ผู้แนะนำ" class="w-full p-3 rounded bg-slate-800">
<button class="big-btn w-full bg-cyan-600 rounded">บันทึก</button>
</form>
</div>
</section>

<!-- CHECKIN -->
<section id="page-checkin" class="hidden">
<div class="glass p-6 rounded-xl max-w-md mx-auto text-center fade">
<h2 class="text-lg font-bold mb-4">เช็คชื่อเข้าอบรม</h2>
<input id="checkPhone" placeholder="กรอกเบอร์โทร" class="w-full p-4 rounded bg-slate-800 text-center text-lg mb-4">
<button onclick="checkUser()" class="big-btn w-full bg-emerald-600 rounded mb-4">ตรวจสอบ</button>

<div id="userCard" class="hidden text-left mt-4 space-y-4">
<div id="userName" class="font-bold text-lg"></div>
<div id="userTeam" class="text-sm text-slate-400"></div>

<div>
Day 1
<div class="progress bg-slate-700 mt-1"><div id="p1" class="progress bg-cyan-500 w-0"></div></div>
<button onclick="doCheck(1)" class="big-btn w-full bg-cyan-600 rounded mt-2">เช็คชื่อ Day 1</button>
</div>

<div>
Day 2
<div class="progress bg-slate-700 mt-1"><div id="p2" class="progress bg-cyan-500 w-0"></div></div>
<button onclick="doCheck(2)" class="big-btn w-full bg-cyan-600 rounded mt-2">เช็คชื่อ Day 2</button>
</div>

<div>
Day 3
<div class="progress bg-slate-700 mt-1"><div id="p3" class="progress bg-cyan-500 w-0"></div></div>
<button onclick="doCheck(3)" class="big-btn w-full bg-cyan-600 rounded mt-2">เช็คชื่อ Day 3</button>
</div>

</div>
</div>
</section>

<!-- ADMIN -->
<section id="page-admin" class="hidden">
<div id="adminLogin" class="glass p-6 rounded-xl max-w-sm mx-auto text-center fade">
<h3 class="font-bold mb-4">Admin Login</h3>
<input id="adminPass" type="password" placeholder="Password" class="w-full p-3 rounded bg-slate-800 mb-4">
<button onclick="adminAccess()" class="big-btn w-full bg-red-600 rounded">เข้าสู่ระบบ</button>
</div>

<div id="adminPanel" class="hidden mt-6">
<div class="glass p-4 rounded-xl overflow-auto">
<table class="w-full text-sm">
<thead class="bg-slate-800 text-xs">
<tr>
<th class="p-2">ชื่อ</th>
<th class="p-2">ทีม</th>
<th class="p-2">เข้าเรียน</th>
<th class="p-2">สถานะ</th>
<th class="p-2">จัดการ</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>
</div>
</section>

</main>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyYYauRspNoRvkhUWKZh4c5Hp1TzhxWGu_T96TvPPMZ6p1DHJqh30Azzi_PrEcGn9dy/exec";

function switchTab(t){
["register","checkin","admin"].forEach(p=>document.getElementById("page-"+p).classList.add("hidden"))
document.getElementById("page-"+t).classList.remove("hidden")
}

async function api(payload){
const r=await fetch(API_URL,{method:"POST",body:JSON.stringify(payload)})
return await r.json()
}

regForm.addEventListener("submit",async e=>{
e.preventDefault()
const data=Object.fromEntries(new FormData(e.target))
const r=await api({action:"register",...data})
if(r.status==="success"){Swal.fire("สำเร็จ","ลงทะเบียนแล้ว","success");e.target.reset()}
else Swal.fire("ผิดพลาด",r.message,"error")
})

async function checkUser(){
const phone=checkPhone.value
const r=await api({action:"login",phone})
if(r.status!=="success"){Swal.fire("ไม่พบข้อมูล","","error");return}
const u=r.data
userCard.classList.remove("hidden")
userName.innerText=u.name+" ("+u.nickname+")"
userTeam.innerText="ทีม: "+u.team+" | แผนก: "+u.dept
updateProgress(u)
}

async function doCheck(day){
const phone=checkPhone.value
const r=await api({action:"checkin",phone,day})
if(r.status==="success"){Swal.fire({icon:"success",title:"เช็คชื่อสำเร็จ",timer:1200,showConfirmButton:false});checkUser()}
else Swal.fire("แจ้งเตือน",r.message,"warning")
}

function updateProgress(u){
p1.style.width=u.d1?"100%":"0%"
p2.style.width=u.d2?"100%":"0%"
p3.style.width=u.d3?"100%":"0%"
}

async function adminAccess(){
const pass=adminPass.value
const r=await api({action:"get_admin",pass})
if(r.status!=="success"){Swal.fire("รหัสผิด","","error");return}
adminLogin.classList.add("hidden")
adminPanel.classList.remove("hidden")
renderAdmin(r.data)
}

function renderAdmin(data){
adminTable.innerHTML=""
data.forEach(u=>{
let count=0;if(u.d1)count++;if(u.d2)count++;if(u.d3)count++;
let statusColor="text-blue-400"
if(u.status==="Passed")statusColor="text-emerald-400"
if(["Resigned","New Job"].includes(u.status))statusColor="text-red-400"

adminTable.innerHTML+=`
<tr class="table-row border-b border-slate-700">
<td class="p-2">${u.prefix||""} ${u.name}<div class="text-xs text-slate-400">${u.nickname}</div></td>
<td class="p-2">${u.team}</td>
<td class="p-2 text-center">${count}/3</td>
<td class="p-2 ${statusColor}">${u.status}</td>
<td class="p-2 text-center">
<button onclick="deleteUser(${u.row})" class="text-red-400"><i class="fa fa-trash"></i></button>
</td>
</tr>`
})
}

async function deleteUser(row){
if(!confirm("ลบข้อมูล?"))return
await api({action:"admin_delete",row})
adminAccess()
}
</script>

</body>
</html>
