<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HR Training Portal | Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Prompt:wght@300;400;500;600&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Sarabun', 'sans-serif'],
                        header: ['Prompt', 'sans-serif'],
                        digital: ['Chakra Petch', 'sans-serif']
                    },
                    colors: {
                        glass: "rgba(255, 255, 255, 0.03)",
                        glassBorder: "rgba(255, 255, 255, 0.08)"
                    },
                    boxShadow: { glow: '0 0 20px rgba(56, 189, 248, 0.15)' }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #0f172a; 
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: #e2e8f0; min-height: 100vh;
        }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .glass-input:focus { border-color: #38bdf8; background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); outline: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .loader { width: 40px; height: 40px; border: 3px solid #FFF; border-bottom-color: #38bdf8; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .nav-btn.active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        .font-digital { font-family: 'Chakra Petch', sans-serif; }
        .text-glow { text-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* สไตล์สำหรับ Mobile Card View Table */
        @media (max-width: 768px) {
            .table-container table { min-width: 100% !important; }
            .table-container thead { display: none; }
            .table-container tr {
                display: block;
                background: rgba(30, 41, 59, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 1rem;
                margin-bottom: 1rem;
                padding: 0.5rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            .table-container td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.75rem 0.5rem;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                text-align: right;
                width: 100% !important;
            }
            .table-container td:last-child { border-bottom: none; }
            .table-container td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #94a3b8;
                font-family: 'Prompt', sans-serif;
                text-transform: uppercase;
                font-size: 0.7rem;
                text-align: left;
                margin-right: 1rem;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-200" onload="initApp()">

    <header class="glass-panel sticky top-0 z-50 rounded-b-3xl mx-2 mt-2 px-6 py-4 shadow-glow mb-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-layer-group"></i></div>
                <div>
                    <h1 class="font-header font-bold text-sm text-white tracking-wide">HR PORTAL</h1>
                    <p class="text-[10px] text-cyan-400 font-medium tracking-wider uppercase">Training System</p>
                </div>
            </div>
            <div class="text-right">
                <div id="clockDate" class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">...</div>
                <div id="clockTime" class="font-digital text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-cyan-200 leading-none mt-0.5">00:00</div>
            </div>
        </div>
        <div class="flex justify-center mt-4 border-t border-white/5 pt-2 gap-1">
            <button onclick="switchTab('register')" id="nav-register" class="nav-btn active flex-1 py-2 rounded-lg text-xs font-header transition-all hover:bg-white/5 text-slate-400">ลงทะเบียน</button>
            <button onclick="switchTab('checkin')" id="nav-checkin" class="nav-btn flex-1 py-2 rounded-lg text-xs font-header transition-all hover:bg-white/5 text-slate-400">เช็คชื่อ</button>
            <button onclick="switchTab('admin')" id="nav-admin" class="nav-btn flex-1 py-2 rounded-lg text-xs font-header transition-all hover:bg-white/5 text-slate-400">Admin</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 pb-24 scroll-smooth">
        <div id="loadingOverlay" class="hidden fixed inset-0 z-[60] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <p class="text-xs text-cyan-400 font-header tracking-widest animate-pulse">PROCESSING...</p>
        </div>

        <section id="page-register" class="max-w-md mx-auto animate-fade-in">
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-40 h-40 bg-cyan-500/10 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none group-hover:bg-cyan-500/20 transition duration-700"></div>
                <h2 class="text-lg font-header font-bold text-white mb-6 flex items-center gap-2"><span class="w-1 h-5 bg-cyan-400 rounded-full"></span> ลงทะเบียนพนักงานใหม่</h2>
                <form id="regForm" onsubmit="handleRegister(event)" class="space-y-4 relative z-10">
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">คำนำหน้า</label><select id="regPrefix" name="prefix" class="w-full px-3 py-2.5 rounded-xl glass-input text-sm focus:ring-0"><option class="text-slate-900">นาย</option><option class="text-slate-900">นาง</option><option class="text-slate-900">นางสาว</option></select></div>
                        <div class="col-span-2"><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">ชื่อ-นามสกุล</label><input type="text" id="regName" name="name" required class="w-full px-3 py-2.5 rounded-xl glass-input text-sm placeholder-slate-600" placeholder="ระบุทั้งชื่อและนามสกุล"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">ชื่อเล่น</label><input type="text" id="regNickname" name="nickname" required class="w-full px-3 py-2.5 rounded-xl glass-input text-sm"></div>
                        <div><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">เบอร์โทร</label><input type="tel" id="regPhone" name="phone" required class="w-full px-3 py-2.5 rounded-xl glass-input text-sm" placeholder="ตัวเลข 10 หลัก"></div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">แผนก</label>
                        <select id="regDept" name="dept" class="w-full px-3 py-2.5 rounded-xl glass-input text-sm">
                            <option value="Telesales Product" class="text-slate-900">Telesales Product</option><option value="Telesales Insurance" class="text-slate-900">Telesales Insurance</option><option value="Back Office" class="text-slate-900">Back Office</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">ทีม</label><input type="text" id="regTeam" name="team" class="w-full px-3 py-2.5 rounded-xl glass-input text-sm"></div>
                        <div><label class="text-[10px] text-slate-400 font-bold mb-1.5 block ml-1">ผู้แนะนำ</label><input type="text" id="regRecruiter" name="recruiter" class="w-full px-3 py-2.5 rounded-xl glass-input text-sm"></div>
                    </div>
                    <button type="submit" class="w-full mt-4 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-header font-medium rounded-xl shadow-lg shadow-cyan-900/20 transition-all transform active:scale-[0.98]">ยืนยันข้อมูล</button>
                </form>
            </div>
        </section>

        <section id="page-checkin" class="hidden max-w-md mx-auto pt-4">
            <div class="glass-panel p-8 rounded-2xl text-center relative overflow-hidden">
                <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
                <div class="w-20 h-20 bg-slate-800/50 rounded-2xl mx-auto flex items-center justify-center mb-6 border border-slate-700 shadow-inner rotate-3 hover:rotate-0 transition duration-500">
                    <i class="fa-solid fa-fingerprint text-4xl text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]"></i>
                </div>
                <h2 class="text-xl font-header font-bold text-white mb-2">ลงชื่อเข้าอบรม</h2>
                <p class="text-xs text-slate-400 mb-8 font-light">กรอกเบอร์โทรศัพท์เพื่อยืนยันตัวตน</p>
                <div class="relative max-w-xs mx-auto mb-6 group">
                    <input type="tel" id="checkinPhone" class="w-full pl-12 pr-4 py-3.5 rounded-xl glass-input text-lg tracking-[0.2em] text-center font-digital group-focus-within:border-cyan-500 transition-colors" placeholder="08XXXXXXXX">
                    <i class="fa-solid fa-mobile-screen absolute left-4 top-4 text-slate-500 text-lg group-focus-within:text-cyan-400 transition-colors"></i>
                </div>
                <button onclick="checkStatus()" class="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-header font-medium transition border border-slate-600 hover:border-slate-500">ตรวจสอบสถานะ</button>

                <div id="profileCard" class="hidden mt-8 text-left bg-slate-800/40 rounded-xl p-5 border border-slate-700/50 animate-float">
                    <div class="flex justify-between items-start mb-4 pb-4 border-b border-white/5">
                        <div><h3 class="text-lg font-header font-bold text-white" id="uiName">...</h3><p class="text-xs text-slate-400 mt-1 font-mono"><span id="uiNick">...</span> | <span id="uiDept" class="text-cyan-400">...</span></p></div>
                        <span id="uiStatus" class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 tracking-wider">Active</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div id="boxD1" class="bg-slate-900/50 p-2 rounded-lg text-center border border-white/5"><span class="text-[10px] text-slate-500 uppercase font-bold block mb-2 tracking-wider">Day 1</span><button onclick="doCheckIn(1)" class="w-full py-1.5 rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-cyan-600 transition"><i class="fa-solid fa-check"></i></button></div>
                        <div id="boxD2" class="bg-slate-900/50 p-2 rounded-lg text-center border border-white/5"><span class="text-[10px] text-slate-500 uppercase font-bold block mb-2 tracking-wider">Day 2</span><button onclick="doCheckIn(2)" class="w-full py-1.5 rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-cyan-600 transition"><i class="fa-solid fa-check"></i></button></div>
                        <div id="boxD3" class="bg-slate-900/50 p-2 rounded-lg text-center border border-white/5"><span class="text-[10px] text-slate-500 uppercase font-bold block mb-2 tracking-wider">Day 3</span><button onclick="doCheckIn(3)" class="w-full py-1.5 rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-cyan-600 transition"><i class="fa-solid fa-check"></i></button></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-admin" class="hidden h-full flex flex-col">
            <div id="adminLogin" class="max-w-xs mx-auto glass-panel p-8 rounded-2xl text-center mt-10 border border-red-500/20">
                <div class="w-14 h-14 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20"><i class="fa-solid fa-shield-cat text-2xl text-red-400"></i></div>
                <h3 class="text-white font-header font-bold mb-6">Restricted Area</h3>
                <input type="password" id="adminPass" class="w-full px-4 py-3 rounded-xl glass-input text-center mb-4 text-sm" placeholder="Admin Password">
                <button onclick="adminAccess()" class="w-full py-2.5 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold text-sm transition shadow-lg shadow-red-900/30">เข้าสู่ระบบ (รหัส: admin)</button>
            </div>

            <div id="adminDashboard" class="hidden flex-1 flex flex-col">
                <div class="glass-panel p-4 rounded-xl mb-4 flex flex-col md:flex-row gap-4 items-center">
                    <div class="w-32 h-32 relative">
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="flex-1 grid grid-cols-2 gap-2 text-center w-full">
                        <div class="bg-slate-800/50 p-2 rounded-lg border border-white/5">
                            <p class="text-[10px] text-slate-400 uppercase">ทั้งหมด</p>
                            <p id="statTotal" class="text-xl font-digital text-white font-bold">0</p>
                        </div>
                        <div class="bg-emerald-900/20 p-2 rounded-lg border border-emerald-500/20">
                            <p class="text-[10px] text-emerald-400 uppercase">ผ่านเกณฑ์</p>
                            <p id="statPassed" class="text-xl font-digital text-emerald-400 font-bold">0</p>
                        </div>
                        <div class="bg-blue-900/20 p-2 rounded-lg border border-blue-500/20">
                            <p class="text-[10px] text-blue-400 uppercase">กำลังเทรน</p>
                            <p id="statActive" class="text-xl font-digital text-blue-400 font-bold">0</p>
                        </div>
                        <div class="bg-red-900/20 p-2 rounded-lg border border-red-500/20">
                            <p class="text-[10px] text-red-400 uppercase">สละสิทธิ์</p>
                            <p id="statDropout" class="text-xl font-digital text-red-400 font-bold">0</p>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-white font-header font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-database text-cyan-400"></i> ฐานข้อมูล</h2>
                    <div class="flex gap-2 flex-wrap justify-end">
                        <button onclick="exportToExcel()" class="text-[10px] bg-[#107c41] border border-[#185c37] hover:bg-[#185c37] text-white px-3 py-1.5 rounded-lg transition flex items-center gap-1 shadow-lg shadow-green-900/50"><i class="fa-solid fa-file-excel"></i> Export</button>
                    </div>
                </div>
                
                <div class="flex-1 table-container glass-panel rounded-xl mb-20 border-0 shadow-lg">
                    <table class="w-full min-w-[600px] text-left border-collapse">
                        <thead class="bg-slate-900/80 backdrop-blur text-slate-400 text-[10px] font-bold uppercase sticky top-0 z-10 shadow-md">
                            <tr>
                                <th class="p-3 w-10 text-center">#</th>
                                <th class="p-3">ข้อมูล & การเข้าเรียน</th>
                                <th class="p-3 text-center w-24">สถานะ</th>
                                <th class="p-3 text-center w-20">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="adminTable" class="divide-y divide-slate-700/50 text-sm text-slate-300">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        // **********************************************
        // 🔴 เชื่อมต่อ URL WEB APP (Apps Script) ของคุณ
        // **********************************************
        const API_URL = "https://script.google.com/macros/s/AKfycbyYYauRspNoRvkhUWKZh4c5Hp1TzhxWGu_T96TvPPMZ6p1DHJqh30Azzi_PrEcGn9dy/exec"; 
        // **********************************************

        function initApp() {
            startTime();
        }

        // ระบบนาฬิกา
        function startTime() {
            const today = new Date();
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
            const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
            
            document.getElementById('clockTime').innerText = today.toLocaleTimeString('en-US', timeOptions);
            document.getElementById('clockDate').innerText = today.toLocaleDateString('en-GB', dateOptions);
            setTimeout(startTime, 1000);
        }

        // ระบบเปลี่ยนหน้า (Tabs)
        function switchTab(tabId) {
            document.getElementById('page-register').classList.add('hidden');
            document.getElementById('page-checkin').classList.add('hidden');
            document.getElementById('page-admin').classList.add('hidden');
            
            document.getElementById('nav-register').classList.remove('active');
            document.getElementById('nav-checkin').classList.remove('active');
            document.getElementById('nav-admin')
